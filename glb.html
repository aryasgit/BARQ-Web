<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>GLB Inspector</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>
<style>
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1c1c1c;
  --border: rgba(255,255,255,0.1);
  --text: #e8e4dc;
  --muted: #6b6b6b;
  --accent: #c8ff00;
  --accent-dim: #5a7200;
  --blue: #4da3ff;
  --coral: #ff6b4a;
  --purple: #b39dff;
  --mono: 'SF Mono','Fira Code','JetBrains Mono',monospace;
}
* { margin:0;padding:0;box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.5;
  min-height: 100vh;
}

/* ── Drop zone ── */
#drop-zone {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  height: 100vh;
  border: 1px dashed var(--border);
  margin: 1.5rem;
  border-radius: 4px;
  transition: border-color 0.2s, background 0.2s;
  cursor: pointer;
  position: relative;
}
#drop-zone.drag-over {
  border-color: var(--accent);
  background: rgba(200,255,0,0.04);
}
#drop-zone input[type="file"] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.drop-icon {
  font-size: 3rem;
  opacity: 0.25;
}
.drop-title {
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.25em;
  color: var(--text);
}
.drop-sub {
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--muted);
}

/* ── Results layout ── */
#results {
  display: none;
  padding: 1.5rem;
  gap: 1.5rem;
  flex-direction: column;
}
#results.visible { display: flex; }

/* ── 3D preview ── */
#preview-wrap {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 1.5rem;
  align-items: start;
}
#canvas-container {
  border: 1px solid var(--border);
  border-radius: 4px;
  aspect-ratio: 4/3;
  overflow: hidden;
  position: relative;
}
#canvas-container canvas {
  width: 100% !important;
  height: 100% !important;
  display: block;
}
.canvas-hint {
  position: absolute;
  bottom: 0.6rem; left: 50%;
  transform: translateX(-50%);
  font-size: 0.5rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--muted);
  pointer-events: none;
}

/* ── Summary cards ── */
.card-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.6rem;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 0.8rem 1rem;
}
.stat-label {
  font-size: 0.45rem;
  text-transform: uppercase;
  letter-spacing: 0.25em;
  color: var(--accent);
  margin-bottom: 0.3rem;
}
.stat-value {
  font-size: 1.3rem;
  font-weight: 300;
  color: var(--text);
  line-height: 1;
}
.stat-sub {
  font-size: 0.5rem;
  color: var(--muted);
  margin-top: 0.25rem;
}

/* ── Sections ── */
.section {
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
}
.section-header {
  background: var(--surface);
  padding: 0.6rem 1rem;
  font-size: 0.5rem;
  text-transform: uppercase;
  letter-spacing: 0.3em;
  color: var(--accent);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.section-header .count {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 0.1em 0.6em;
  font-size: 0.45rem;
  color: var(--muted);
}
.section-body {
  padding: 0;
}

/* ── Tree rows ── */
.tree-row {
  display: grid;
  border-bottom: 1px solid var(--border);
  padding: 0.45rem 1rem;
  gap: 0.5rem;
  align-items: baseline;
}
.tree-row:last-child { border-bottom: none; }
.tree-row.mesh-row  { grid-template-columns: 2fr 1fr 1fr 1fr 1fr; }
.tree-row.mat-row   { grid-template-columns: 2fr 1fr 1fr 1fr; }
.tree-row.tex-row   { grid-template-columns: 2fr 1fr 1fr 1fr; }
.tree-row.anim-row  { grid-template-columns: 2fr 1fr 1fr; }
.tree-row.header-row {
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
}
.tree-row.header-row span {
  font-size: 0.45rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--muted);
}
.col-name { color: var(--text); font-size: 0.65rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.col-name .indent { color: var(--muted); }
.col-val  { font-size: 0.6rem; color: var(--blue); }
.col-muted { font-size: 0.6rem; color: var(--muted); }
.col-accent { font-size: 0.6rem; color: var(--accent); }
.col-coral  { font-size: 0.6rem; color: var(--coral); }
.col-purple { font-size: 0.6rem; color: var(--purple); }

.badge {
  display: inline-block;
  font-size: 0.4rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  padding: 0.1em 0.5em;
  border-radius: 2px;
  border: 1px solid;
}
.badge-green  { color: var(--accent);  border-color: var(--accent-dim); }
.badge-blue   { color: var(--blue);    border-color: rgba(77,163,255,0.4); }
.badge-coral  { color: var(--coral);   border-color: rgba(255,107,74,0.4); }
.badge-purple { color: var(--purple);  border-color: rgba(179,157,255,0.4); }
.badge-muted  { color: var(--muted);   border-color: var(--border); }

/* ── Bounding box viz ── */
.bb-row {
  display: flex;
  gap: 0.5rem;
  padding: 0.8rem 1rem;
  flex-wrap: wrap;
}
.bb-axis {
  flex: 1;
  min-width: 100px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 0.6rem 0.8rem;
}
.bb-axis-label {
  font-size: 0.45rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--muted);
  margin-bottom: 0.3rem;
}
.bb-axis-val {
  font-size: 1rem;
  font-weight: 300;
  color: var(--accent);
}
.bb-axis-unit {
  font-size: 0.5rem;
  color: var(--muted);
  margin-top: 0.2rem;
}

/* ── Warn box ── */
.warn-box {
  background: rgba(255,107,74,0.08);
  border: 1px solid rgba(255,107,74,0.3);
  border-radius: 4px;
  padding: 0.8rem 1rem;
  font-size: 0.6rem;
  color: var(--coral);
  line-height: 1.6;
}
.warn-box strong { color: var(--coral); font-weight: 500; }

/* ── Hint box ── */
.hint-box {
  background: rgba(200,255,0,0.05);
  border: 1px solid var(--accent-dim);
  border-radius: 4px;
  padding: 0.8rem 1rem;
  font-size: 0.6rem;
  color: var(--text);
  line-height: 1.7;
}
.hint-box .hint-title {
  font-size: 0.45rem;
  text-transform: uppercase;
  letter-spacing: 0.25em;
  color: var(--accent);
  margin-bottom: 0.5rem;
}

/* ── Progress bar ── */
#progress-wrap {
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 1rem;
  height: 100vh;
}
#progress-wrap.visible { display: flex; }
.prog-label {
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.25em;
  color: var(--muted);
}
.prog-bar {
  width: 240px; height: 1px;
  background: var(--border);
  position: relative;
}
.prog-fill {
  position: absolute; left: 0; top: 0; height: 100%;
  background: var(--accent);
  width: 0%;
  transition: width 0.1s linear;
}
.prog-pct {
  font-size: 2rem;
  font-weight: 300;
  color: var(--text);
}
</style>
</head>
<body>

<div id="drop-zone">
  <input type="file" id="file-input" accept=".glb,.gltf">
  <div class="drop-icon">⬡</div>
  <div class="drop-title">Drop robot.glb here</div>
  <div class="drop-sub">or click to browse · .glb / .gltf</div>
</div>

<div id="progress-wrap">
  <div class="prog-label" id="prog-label">Parsing GLB...</div>
  <div class="prog-pct" id="prog-pct">0%</div>
  <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
</div>

<div id="results">

  <div id="preview-wrap">
    <div id="canvas-container">
      <canvas id="preview-canvas"></canvas>
      <div class="canvas-hint">drag to rotate · scroll to zoom</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:0.8rem;">
      <div id="summary-cards" class="card-grid"></div>
      <div id="origin-hint"></div>
    </div>
  </div>

  <div id="warnings-section"></div>

  <div class="section" id="bbox-section">
    <div class="section-header">Bounding Box <span class="count" id="bb-unit-badge">raw units</span></div>
    <div id="bbox-body"></div>
  </div>

  <div class="section" id="meshes-section">
    <div class="section-header">Meshes <span class="count" id="mesh-count">0</span></div>
    <div class="section-body" id="meshes-body"></div>
  </div>

  <div class="section" id="materials-section">
    <div class="section-header">Materials <span class="count" id="mat-count">0</span></div>
    <div class="section-body" id="materials-body"></div>
  </div>

  <div class="section" id="textures-section">
    <div class="section-header">Textures <span class="count" id="tex-count">0</span></div>
    <div class="section-body" id="textures-body"></div>
  </div>

  <div class="section" id="anims-section">
    <div class="section-header">Animations <span class="count" id="anim-count">0</span></div>
    <div class="section-body" id="anims-body"></div>
  </div>

  <div class="section" id="scene-section">
    <div class="section-header">Scene Hierarchy</div>
    <div class="section-body" id="scene-body"></div>
  </div>

  <div id="three-hint" class="hint-box" style="display:none;">
    <div class="hint-title">Recommended Three.js settings for this model</div>
    <div id="hint-content"></div>
  </div>

</div>

<script>
const dropZone  = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const results   = document.getElementById('results');
const progWrap  = document.getElementById('progress-wrap');

dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

function handleFile(file) {
  if (!file) return;
  dropZone.style.display = 'none';
  progWrap.classList.add('visible');

  const reader = new FileReader();
  reader.onprogress = e => {
    if (e.lengthComputable) {
      const p = Math.round(e.loaded / e.total * 100);
      document.getElementById('prog-pct').textContent = p + '%';
      document.getElementById('prog-fill').style.width = p + '%';
    }
  };
  reader.onload = e => {
    document.getElementById('prog-label').textContent = 'Parsing scene…';
    document.getElementById('prog-pct').textContent = '100%';
    document.getElementById('prog-fill').style.width = '100%';
    parseGLB(e.target.result, file.name, file.size);
  };
  reader.readAsArrayBuffer(file);
}

function parseGLB(buffer, filename, fileSize) {
  const loader = new THREE.GLTFLoader();
  loader.parse(buffer, '', gltf => {
    progWrap.classList.remove('visible');
    results.classList.add('visible');
    inspectGLTF(gltf, filename, fileSize);
  }, err => {
    progWrap.classList.remove('visible');
    dropZone.style.display = 'flex';
    alert('Failed to parse GLB: ' + err.message);
  });
}

function fmt(n, dec=2) { return (typeof n === 'number') ? n.toFixed(dec) : n; }
function fmtBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(2) + ' MB';
}

function badge(text, cls) {
  return `<span class="badge badge-${cls}">${text}</span>`;
}

function inspectGLTF(gltf, filename, fileSize) {
  const scene = gltf.scene;

  // ── Collect all objects ──────────────────────────────
  const meshes    = [];
  const materials = new Map();
  const textures  = new Map();

  scene.traverse(obj => {
    if (obj.isMesh) {
      meshes.push(obj);
      if (obj.material) {
        const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
        mats.forEach(m => {
          if (m && !materials.has(m.uuid)) materials.set(m.uuid, m);
        });
      }
    }
  });

  materials.forEach(m => {
    const texSlots = ['map','normalMap','roughnessMap','metalnessMap','emissiveMap','aoMap','alphaMap'];
    texSlots.forEach(slot => {
      if (m[slot] && !textures.has(m[slot].uuid)) textures.set(m[slot].uuid, { tex: m[slot], slot });
    });
  });

  const texArr  = [...textures.values()];
  const matArr  = [...materials.values()];
  const animArr = gltf.animations || [];

  // ── Bounding box ────────────────────────────────────
  const box    = new THREE.Box3().setFromObject(scene);
  const size   = new THREE.Vector3();
  const center = new THREE.Vector3();
  box.getSize(size);
  box.getCenter(center);
  const maxDim = Math.max(size.x, size.y, size.z);

  // Guess Blender units from maxDim
  let unitGuess = 'Blender units (~m)';
  let unitScale = 1;
  if (maxDim > 10)   { unitGuess = 'mm (maxDim=' + fmt(maxDim,1) + ')';  unitScale = 0.001; }
  else if (maxDim > 1.5) { unitGuess = 'cm (maxDim=' + fmt(maxDim,1) + ')'; unitScale = 0.01; }
  else                { unitGuess = 'm / Blender units (maxDim=' + fmt(maxDim,3) + ')'; unitScale = 1; }

  // Total triangle count
  let totalTris = 0;
  let totalVerts = 0;
  meshes.forEach(m => {
    const g = m.geometry;
    if (g.index) totalTris += g.index.count / 3;
    else totalTris += g.attributes.position.count / 3;
    totalVerts += g.attributes.position ? g.attributes.position.count : 0;
  });

  // ── Summary cards ────────────────────────────────────
  const cards = [
    { label: 'File Size',    value: fmtBytes(fileSize),                sub: filename },
    { label: 'Meshes',       value: meshes.length,                     sub: Math.round(totalTris).toLocaleString() + ' triangles' },
    { label: 'Materials',    value: matArr.length,                     sub: texArr.length + ' textures' },
    { label: 'Animations',   value: animArr.length,                    sub: animArr.length ? animArr.map(a=>a.name||'unnamed').join(', ') : 'none' },
    { label: 'Bounding Diagonal', value: fmt(maxDim),                  sub: 'max dim, raw units' },
    { label: 'Unit Guess',   value: maxDim > 10 ? 'mm' : maxDim > 1.5 ? 'cm' : 'm', sub: unitGuess },
  ];
  document.getElementById('summary-cards').innerHTML = cards.map(c =>
    `<div class="stat-card">
      <div class="stat-label">${c.label}</div>
      <div class="stat-value">${c.value}</div>
      <div class="stat-sub">${c.sub}</div>
    </div>`
  ).join('');

  // ── Origin hint ──────────────────────────────────────
  const originDist = center.length();
  const originFar  = originDist > maxDim * 0.1;
  document.getElementById('origin-hint').innerHTML = originFar
    ? `<div class="warn-box">
        <strong>Origin offset detected</strong><br>
        Scene center is ${fmt(originDist)} units from world origin (${fmt(center.x)}, ${fmt(center.y)}, ${fmt(center.z)}).
        The JS loader will auto-correct this, so you don't need to fix it in Blender.
       </div>`
    : `<div class="hint-box">
        <div class="hint-title">Origin</div>
        Model is well-centred. Origin offset: ${fmt(originDist,4)} units — no correction needed.
       </div>`;

  // ── Bounding box ─────────────────────────────────────
  document.getElementById('bb-unit-badge').textContent = unitGuess;
  document.getElementById('bbox-body').innerHTML = `
    <div class="bb-row">
      <div class="bb-axis"><div class="bb-axis-label">Width (X)</div><div class="bb-axis-val">${fmt(size.x)}</div><div class="bb-axis-unit">raw · ${fmt(size.x * unitScale * (unitScale===0.001?1000:unitScale===0.01?100:1),1)} mm est.</div></div>
      <div class="bb-axis"><div class="bb-axis-label">Height (Y)</div><div class="bb-axis-val">${fmt(size.y)}</div><div class="bb-axis-unit">raw · ${fmt(size.y * unitScale * (unitScale===0.001?1000:unitScale===0.01?100:1),1)} mm est.</div></div>
      <div class="bb-axis"><div class="bb-axis-label">Depth (Z)</div><div class="bb-axis-val">${fmt(size.z)}</div><div class="bb-axis-unit">raw · ${fmt(size.z * unitScale * (unitScale===0.001?1000:unitScale===0.01?100:1),1)} mm est.</div></div>
    </div>
    <div style="padding:0 1rem 0.8rem;font-size:0.55rem;color:var(--muted);">
      Center: (${fmt(center.x)}, ${fmt(center.y)}, ${fmt(center.z)}) &nbsp;·&nbsp;
      After JS auto-scale (longest axis → 2 units): X=${fmt(size.x/maxDim*2,3)}, Y=${fmt(size.y/maxDim*2,3)}, Z=${fmt(size.z/maxDim*2,3)})
    </div>`;

  // ── Meshes ───────────────────────────────────────────
  document.getElementById('mesh-count').textContent = meshes.length;
  let meshHTML = `<div class="tree-row header-row mesh-row">
    <span>Name</span><span>Verts</span><span>Tris</span><span>Material</span><span>Skinned</span>
  </div>`;
  meshes.forEach(m => {
    const g = m.geometry;
    const verts = g.attributes.position ? g.attributes.position.count : 0;
    const tris  = g.index ? Math.round(g.index.count/3) : Math.round(verts/3);
    const matName = m.material ? (Array.isArray(m.material) ? m.material.map(x=>x.name||'mat').join(', ') : (m.material.name||'unnamed')) : '—';
    const skinned = m.isSkinnedMesh ? badge('skinned','purple') : badge('static','muted');
    meshHTML += `<div class="tree-row mesh-row">
      <span class="col-name">${m.name || '(unnamed)'}</span>
      <span class="col-val">${verts.toLocaleString()}</span>
      <span class="col-val">${tris.toLocaleString()}</span>
      <span class="col-muted">${matName}</span>
      <span>${skinned}</span>
    </div>`;
  });
  document.getElementById('meshes-body').innerHTML = meshHTML;

  // ── Materials ────────────────────────────────────────
  document.getElementById('mat-count').textContent = matArr.length;
  let matHTML = `<div class="tree-row header-row mat-row">
    <span>Name</span><span>Type</span><span>Roughness / Metalness</span><span>Flags</span>
  </div>`;
  matArr.forEach(m => {
    const flags = [];
    if (m.transparent || m.opacity < 1) flags.push(badge('transparent','blue'));
    if (m.alphaTest > 0)   flags.push(badge('alphaTest','coral'));
    if (m.side === THREE.DoubleSide) flags.push(badge('double-sided','muted'));
    if (m.emissive && m.emissiveIntensity > 0) flags.push(badge('emissive','purple'));
    const r = m.roughness !== undefined ? fmt(m.roughness) : '—';
    const met = m.metalness !== undefined ? fmt(m.metalness) : '—';
    matHTML += `<div class="tree-row mat-row">
      <span class="col-name">${m.name || '(unnamed)'}</span>
      <span class="col-accent">${m.type}</span>
      <span class="col-muted">R ${r} / M ${met}</span>
      <span>${flags.join(' ') || '<span class="col-muted">—</span>'}</span>
    </div>`;
  });
  document.getElementById('materials-body').innerHTML = matHTML;

  // ── Textures ─────────────────────────────────────────
  document.getElementById('tex-count').textContent = texArr.length;
  let texHTML = texArr.length
    ? `<div class="tree-row header-row tex-row"><span>Name</span><span>Slot</span><span>Size</span><span>Format</span></div>`
    : `<div style="padding:1rem;font-size:0.6rem;color:var(--muted);">No textures found (materials may be solid colours only)</div>`;
  texArr.forEach(({ tex, slot }) => {
    const w = tex.image ? (tex.image.width || '?') : '?';
    const h = tex.image ? (tex.image.height || '?') : '?';
    const isPow2 = (v) => v > 0 && (v & (v-1)) === 0;
    const pow2ok = (w === '?' || isPow2(w)) && (h === '?' || isPow2(h));
    const sizeStr = w === '?' ? '—' : `${w}×${h}`;
    const sizeBadge = pow2ok ? badge(sizeStr,'green') : badge(sizeStr + ' ⚠ non-pow2','coral');
    texHTML += `<div class="tree-row tex-row">
      <span class="col-name">${tex.name || '(unnamed)'}</span>
      <span class="col-accent">${slot}</span>
      <span>${sizeBadge}</span>
      <span class="col-muted">${tex.format === THREE.RGBAFormat ? 'RGBA' : tex.format === THREE.RGBFormat ? 'RGB' : 'format ' + tex.format}</span>
    </div>`;
  });
  document.getElementById('textures-body').innerHTML = texHTML;

  // ── Animations ───────────────────────────────────────
  document.getElementById('anim-count').textContent = animArr.length;
  let animHTML = animArr.length
    ? `<div class="tree-row header-row anim-row"><span>Name</span><span>Duration</span><span>Tracks</span></div>`
    : `<div style="padding:1rem;font-size:0.6rem;color:var(--muted);">No animations embedded in this GLB</div>`;
  animArr.forEach(a => {
    animHTML += `<div class="tree-row anim-row">
      <span class="col-name">${a.name || '(unnamed)'}</span>
      <span class="col-val">${fmt(a.duration)}s</span>
      <span class="col-muted">${a.tracks.length} tracks</span>
    </div>`;
  });
  document.getElementById('anims-body').innerHTML = animHTML;

  // ── Scene Hierarchy ──────────────────────────────────
  function buildTree(obj, depth=0) {
    const indent = '&nbsp;'.repeat(depth * 3);
    const typeTag = obj.isMesh
      ? badge('mesh','blue')
      : obj.isLight
        ? badge('light','amber')
        : obj.isCamera
          ? badge('camera','coral')
          : obj.isBone
            ? badge('bone','purple')
            : '';
    let html = `<div class="tree-row" style="grid-template-columns:2fr 1fr 1fr;border-bottom:1px solid var(--border);">
      <span class="col-name"><span class="indent">${indent}</span>${obj.name || '('+obj.type+')'}</span>
      <span>${typeTag}</span>
      <span class="col-muted" style="font-size:0.5rem;">${obj.type}</span>
    </div>`;
    obj.children.forEach(child => { html += buildTree(child, depth+1); });
    return html;
  }
  document.getElementById('scene-body').innerHTML = buildTree(scene);

  // ── Three.js Hints ───────────────────────────────────
  const hintEl = document.getElementById('three-hint');
  const hintContent = document.getElementById('hint-content');
  hintEl.style.display = 'block';
  const normalScaleVal = fmt(2.0 / maxDim, 6);
  const scaledH = size.y / maxDim * 2;
  const camDistVal = fmt( (scaledH / 2) / Math.tan(THREE.MathUtils.degToRad(20)) * 1.6, 3 );

  hintContent.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-bottom:0.6rem;">
      <div style="background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:0.6rem 0.8rem;">
        <div style="font-size:0.45rem;text-transform:uppercase;letter-spacing:0.2em;color:var(--muted);margin-bottom:0.3rem;">Auto-scale factor</div>
        <div style="color:var(--accent);font-size:0.9rem;">${normalScaleVal}</div>
        <div style="font-size:0.5rem;color:var(--muted);">model.scale.setScalar(${normalScaleVal})</div>
      </div>
      <div style="background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:0.6rem 0.8rem;">
        <div style="font-size:0.45rem;text-transform:uppercase;letter-spacing:0.2em;color:var(--muted);margin-bottom:0.3rem;">Suggested camera Z</div>
        <div style="color:var(--accent);font-size:0.9rem;">${camDistVal}</div>
        <div style="font-size:0.5rem;color:var(--muted);">FOV 40° · model fills 75%</div>
      </div>
    </div>
    <div style="font-size:0.55rem;color:var(--muted);line-height:1.8;">
      Center offset to subtract: model.position.sub(new THREE.Vector3(${fmt(center.x,4)}, ${fmt(center.y,4)}, ${fmt(center.z,4)}))<br>
      Unit guess: <span style="color:var(--text);">${unitGuess}</span><br>
      ${animArr.length ? 'Animations detected — use THREE.AnimationMixer to play them.<br>' : ''}
      ${texArr.some(t => t.tex.image && !(t.tex.image.width > 0 && (t.tex.image.width & (t.tex.image.width-1)) === 0)) ? '<span style="color:var(--coral);">⚠ Non-power-of-2 textures found — may cause issues in WebGL.</span><br>' : ''}
      ${matArr.some(m => m.transparent) ? '<span style="color:var(--blue);">Transparent materials detected — ensure renderer has alpha:true</span><br>' : ''}
      renderer.outputEncoding = THREE.sRGBEncoding;<br>
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
    </div>
  `;

  // ── 3D Preview ───────────────────────────────────────
  setupPreview(gltf.scene, gltf.animations);
}

function setupPreview(model, animations) {
  const container = document.getElementById('canvas-container');
  const canvas    = document.getElementById('preview-canvas');

  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;

  const w = container.clientWidth, h = container.clientHeight;
  renderer.setSize(w, h, false);

  const camera = new THREE.PerspectiveCamera(40, w/h, 0.001, 1000);
  const scene  = new THREE.Scene();

  scene.add(new THREE.AmbientLight(0xffffff, 0.7));
  const key = new THREE.DirectionalLight(0xffffff, 2);
  key.position.set(2,3,3); scene.add(key);
  const fill = new THREE.DirectionalLight(0xaaccff, 0.5);
  fill.position.set(-3,1,1); scene.add(fill);
  const rim = new THREE.DirectionalLight(0xc8ff00, 0.35);
  rim.position.set(0,-1,-3); scene.add(rim);
  scene.add(new THREE.HemisphereLight(0x223322,0x111111,0.4));

  // Auto-fit model
  const box = new THREE.Box3().setFromObject(model);
  const size = new THREE.Vector3(); box.getSize(size);
  const center = new THREE.Vector3(); box.getCenter(center);
  model.position.sub(center);
  const maxDim = Math.max(size.x, size.y, size.z);
  model.scale.setScalar(2.0 / maxDim);
  scene.add(model);

  const scaledH = size.y / maxDim * 2;
  const dist = (scaledH / 2) / Math.tan(THREE.MathUtils.degToRad(20)) * 1.6;
  camera.position.set(0, scaledH * 0.15, dist);
  camera.lookAt(0,0,0);

  const controls = new THREE.OrbitControls(camera, canvas);
  controls.enableDamping = true; controls.dampingFactor = 0.08;
  controls.enablePan = false;
  controls.autoRotate = true; controls.autoRotateSpeed = 1.5;
  controls.minDistance = dist * 0.2; controls.maxDistance = dist * 5;
  controls.addEventListener('start', () => { controls.autoRotate = false; });
  controls.addEventListener('end',   () => { controls.autoRotate = true; });

  let mixer = null;
  if (animations && animations.length) {
    mixer = new THREE.AnimationMixer(model);
    mixer.clipAction(animations[0]).play();
  }

  const clock = new THREE.Clock();
  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    if (mixer) mixer.update(clock.getDelta());
    renderer.render(scene, camera);
  }
  animate();

  new ResizeObserver(() => {
    const nw = container.clientWidth, nh = container.clientHeight;
    renderer.setSize(nw, nh, false);
    camera.aspect = nw / nh;
    camera.updateProjectionMatrix();
  }).observe(container);
}
</script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>
